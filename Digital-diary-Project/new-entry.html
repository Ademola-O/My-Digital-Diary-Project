  <main class="nEntry">
    <div class="editor-layout">
        <aside class="sidebar">

            <h4>Depth Insight</h4>

            <p>
                Write without judgement.
                The Diary remembers only
                what you choose to ink.
            </p>
        </aside>

        <!-- Main Editor -->

        <section class="editor">

        <!-- Title Area -->

        <div class="title-area">

          <div class="title-line">

            <div class="vertical-line"></div>

            <div class="title-content">

              <div class="date">
                Wednesday, May 22 2024
              </div>

              <input 
                type="text"
                class="title-input"
                placeholder="Untitled Reflection"
              >

            </div>

          </div>

        </div>

        <!-- Tags -->

        <div class="tag-row">

          <button class="tag-btn dark">
            ⊕ Thoughtful
          </button>

          <button class="tag-btn">
            ＋ Add Tag
          </button>

        </div>

        <!-- Text Editor -->

        <textarea placeholder="Begin your reflection..."></textarea>

        <!-- Bottom Controls -->

        <div class="bottom-bar">

            <div class="left-actions">
                <button class="memory-btn"> 🖼 Insert Memory</button>
                <button class="private-btn">🔒 Private</button>
            </div>
            
            <div class="right-actions">
                <button class="discard-btn">Discard</button>
                <button class="save-btn">Save Entry</button>
            </div>

        </div>

      </section>

      <!-- Right Empty Panel -->

      <aside class="right-panel"></aside>

    </div>

  </main>



<!-- Footer -->
